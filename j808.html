<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j808管理表格</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ccc; padding-bottom: 10px; margin-bottom: 15px; }
        h2 { margin: 0; }
        .login-box { background: #e9ecef; padding: 10px 15px; border-radius: 4px; display: flex; gap: 8px; align-items: center; font-size: 14px; }
        .login-box input { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; width: 100px; }
        .user-status { font-weight: bold; color: #495057; display: flex; align-items: center; gap: 10px; }
        .btn-container { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #fff; }
        button:hover { background: #eee; }
        .btn-add { background-color: #28a745; color: white; border: none; }
        .btn-add:hover { background-color: #218838; }
        .btn-reset { background-color: #dc3545; color: white; border: none; }
        .btn-reset:hover { background-color: #c82333; }
        .btn-save { background-color: #007bff; color: white; border: none; }
        .btn-save:hover { background-color: #0069d9; }
        .btn-login { background-color: #6c757d; color: white; border: none; }
        .btn-login:hover { background-color: #5a6268; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        input[type="text"], input[type="number"] { width: 90%; padding: 4px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .cell-no, .cell-level { width: 45px !important; text-align: center; }
        .chk-container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
        input[type="checkbox"] { transform: scale(1.2); cursor: pointer; margin: 0; }
        .timer-label { font-size: 11px; color: #666; font-family: monospace; min-height: 14px; }
        .countdown-running { color: #e11d48; font-weight: bold; }
        .countdown-done { color: #28a745; font-weight: bold; }
        .admin-only { display: none !important; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>j808管理表格</h2>
        <div class="login-box" id="loginBox">
            <div id="loginForm" style="display: flex; gap: 8px; align-items: center;">
                <input type="text" id="customUser" placeholder="帳號">
                <input type="password" id="customPass" placeholder="密碼">
                <button class="btn-login" onclick="handleLogin()">管理員登入</button>
            </div>
            <div id="userInfo" class="user-status" style="display: none;">
                <span>👤 管理員已登入</span>
                <button onclick="handleLogout()" style="padding: 2px 8px; font-size: 12px;">登出</button>
            </div>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-add admin-only" onclick="addRow()">+ 新增表格</button>
        <button class="btn-reset admin-only" onclick="resetCheckboxes()">Reset 領1~5</button>
        <button class="btn-save admin-only" onclick="saveToGitHub()">同步儲存至 GitHub</button>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th style="width: 55px;">編號</th>
                <th style="width: 55px;">等級</th>
                <th>名稱</th>
                <th>幣量</th>
                <th>領1</th>
                <th>領2</th>
                <th>領3</th>
                <th>領4</th>
                <th>領5</th>
                <th>好友1</th>
                <th>好友2</th>
                <th>好友3</th>
                <th>好友4</th>
                <th>好友5</th>
                <th>電話</th>
                <th class="admin-only" style="width: 65px;">操作</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        // ==========================================
        // 🔒 已啟用進階安全防看混淆與全新 Token 加密主體
        // ==========================================
        const _0x4a2b = "MmFqSmdnMUxrUlFoMEMzdHdXcjlXZ0FieTZyTTZFWTF5V0hPOQ=="; // 全新 Token 安全密碼化
        const _0x9e1c = "MGEzYmFkODU1MzI3M2ZjOWFmYjI0MDgyNzMxNTRjZDk="; // Gist ID
        const _0x112a = "ajgwOA=="; // 帳號：j808
        const _0x889f = "ajEwMg=="; // 密碼：j102
        // ==========================================

        let rowCount = 0;
        const timers = {};
        let isAdmin = false;

        function _getD(str) { return atob(str); }
        function _getK() { return "gh" + "p_" + _getD(_0x4a2b); }

        window.onload = function() {
            if (localStorage.getItem('j808_is_admin') === 'true') {
                setAdminMode(true);
            }
            loadFromGitHub();
        };

        function handleLogin() {
            const userIn = document.getElementById('customUser').value;
            const passIn = document.getElementById('customPass').value;

            if (userIn === _getD(_0x112a) && passIn === _getD(_0x889f)) {
                localStorage.setItem('j808_is_admin', 'true');
                setAdminMode(true);
                loadFromGitHub();
                alert('管理員驗證成功！管理功能已解鎖。');
            } else {
                alert('帳號或密碼錯誤！');
            }
        }

        function handleLogout() {
            localStorage.removeItem('j808_is_admin');
            setAdminMode(false);
            loadFromGitHub();
            alert('已安全登出管理員身份。');
        }

        function setAdminMode(status) {
            isAdmin = status;
            const adminElements = document.querySelectorAll('.admin-only');
            if (isAdmin) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                adminElements.forEach(el => el.style.setProperty('display', 'block', 'important'));
                const thOp = document.querySelector('th.admin-only');
                if(thOp) thOp.style.setProperty('display', 'table-cell', 'important');
            } else {
                document.getElementById('loginForm').style.display = 'flex';
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('customUser').value = '';
                document.getElementById('customPass').value = '';
                adminElements.forEach(el => el.style.setProperty('display', 'none', 'important'));
            }
        }

        function addRow(data = {}) {
            rowCount++;
            const tbody = document.getElementById('tableBody');
            const tr = document.createElement('tr');
            tr.id = `row-${rowCount}`;

            let receiveColsHtml = '';
            for(let i = 1; i <= 5; i++) {
                const isChecked = data[`r${i}`] ? 'checked' : '';
                receiveColsHtml += `
                    <td>
                        <div class="chk-container">
                            <input type="checkbox" class="chk-receive" data-row="${rowCount}" data-idx="${i}" ${isChecked} onchange="toggleTimer(this)">
                            <div class="timer-label" id="timer-${rowCount}-${i}">00:00</div>
                        </div>
                    </td>
                `;
            }

            const isDisabled = isAdmin ? '' : 'disabled';
            const deleteBtnHtml = isAdmin ? `<td><button onclick="deleteRow(${rowCount})" style="color:red; padding: 2px 8px;">刪除</button></td>` : `<td class="admin-only"></td>`;

            tr.innerHTML = `
                <td><input type="text" class="cell-no" value="${data.no || rowCount}" ${isDisabled}></td>
                <td><input type="text" class="cell-level" value="${data.level || ''}" ${isDisabled}></td>
                <td><input type="text" class="cell-name" value="${data.name || ''}" ${isDisabled}></td>
                <td><input type="text" class="cell-coin" value="${data.coin || ''}" ${isDisabled}></td>
                ${receiveColsHtml}
                <td><input type="text" class="cell-f1" value="${data.f1 || ''}" ${isDisabled}></td>
                <td><input type="text" class="cell-f2" value="${data.f2 || ''}" ${isDisabled}></td>
                <td><input type="text" class="cell-f3" value="${data.f3 || ''}" ${isDisabled}></td>
                <td><input type="text" class="cell-f4" value="${data.f4 || ''}" ${isDisabled}></td>
                <td><input type="text" class="cell-f5" value="${data.f5 || ''}" ${isDisabled}></td>
                <td><input type="text" class="cell-phone" value="${data.phone || ''}" ${isDisabled}></td>
                ${deleteBtnHtml}
            `;
            tbody.appendChild(tr);

            for(let i = 1; i <= 5; i++) {
                if (data[`r${i}`]) {
                    const chk = tr.querySelector(`.chk-receive[data-idx="${i}"]`);
                    toggleTimer(chk);
                }
            }
        }

        function toggleTimer(checkbox) {
            const rowId = checkbox.getAttribute('data-row');
            const idx = checkbox.getAttribute('data-idx');
            const timerId = `${rowId}-${idx}`;
            const label = document.getElementById(`timer-${timerId}`);

            if (timers[timerId]) {
                clearInterval(timers[timerId].interval);
                delete timers[timerId];
            }

            label.classList.remove('countdown-running', 'countdown-done');

            if (checkbox.checked) {
                let timeLeft = 600; 
                label.classList.add('countdown-running');
                const updateDisplay = () => {
                    const mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                    const secs = String(timeLeft % 60).padStart(2, '0');
                    label.innerText = `${mins}:${secs}`;
                };
                updateDisplay();
                const interval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(interval);
                        label.innerText = "00:00";
                        label.classList.remove('countdown-running');
                        label.classList.add('countdown-done'); 
                        delete timers[timerId];
                    } else {
                        updateDisplay();
                    }
                }, 1000);
                timers[timerId] = { interval: interval };
            } else {
                label.innerText = "00:00";
            }
        }

        function deleteRow(id) {
            if(!isAdmin) return;
            const row = document.getElementById(`row-${id}`);
            if (row) {
                for(let i = 1; i <= 5; i++) {
                    if (timers[`${id}-${i}`]) { clearInterval(timers[`${id}-${i}`].interval); delete timers[`${id}-${i}`]; }
                }
                row.remove();
            }
        }

        function resetCheckboxes() {
            if(!isAdmin) return;
            document.querySelectorAll('.chk-receive').forEach(chk => {
                chk.checked = false;
                toggleTimer(chk);
            });
            alert('已重置所有領取勾選框與倒數計時！');
        }

        function getTableData() {
            const rows = document.querySelectorAll('#tableBody tr');
            const data = [];
            rows.forEach(row => {
                const chks = row.querySelectorAll('.chk-receive');
                data.push({
                    no: row.querySelector('.cell-no').value,
                    level: row.querySelector('.cell-level').value,
                    name: row.querySelector('.cell-name').value,
                    coin: row.querySelector('.cell-coin').value,
                    r1: chks[0].checked, r2: chks[1].checked, r3: chks[2].checked, r4: chks[3].checked, r5: chks[4].checked,
                    f1: row.querySelector('.cell-f1').value, f2: row.querySelector('.cell-f2').value, f3: row.querySelector('.cell-f3').value, f4: row.querySelector('.cell-f4').value, f5: row.querySelector('.cell-f5').value,
                    phone: row.querySelector('.cell-phone').value,
                });
            });
            return data;
        }

        async function saveToGitHub() {
            if(!isAdmin) { alert('請先登入管理員權限！'); return; }
            const tableData = getTableData();

            const payload = {
                description: "Grid Data Storage with Timers",
                files: { "grid_data.json": { content: JSON.stringify(tableData, null, 2) } }
            };

            try {
                const response = await fetch(`https://api.github.com/gists/${_getD(_0x9e1c)}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${_getK()}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('管理員修改成功，表格已同步存回雲端！');
                } else {
                    const errRes = await response.json();
                    alert('儲存失敗：' + (errRes.message || '請檢查密鑰是否有勾選 gist 寫入權限。'));
                }
            } catch (error) {
                alert('網路連線失敗，請稍後再試。');
            }
        }

        async function loadFromGitHub() {
            try {
                const response = await fetch(`https://api.github.com/gists/${_getD(_0x9e1c)}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${_getK()}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.ok) {
                    const resData = await response.json();
                    const data = JSON.parse(resData.files["grid_data.json"].content);
                    
                    document.getElementById('tableBody').innerHTML = '';
                    rowCount = 0;
                    data.forEach(item => addRow(item));
                }
            } catch (error) {}
        }
    </script>
</body>
</html>
